image: ubuntu:24.04

stages:
  - build

variables:
  DEBIAN_FRONTEND: noninteractive
  GIT_STRATEGY: fetch
  GIT_DEPTH: "1"
  CMAKE_GENERATOR: Ninja

build:ziggurat:
  stage: build
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl git cmake ninja-build python3 xz-utils binutils clang
  script:
    - chmod +x scripts/*.sh
    - ./scripts/ci-release.sh
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - dist/ziggurat-*.tar.xz
      - dist/*.sha256
      - dist/*.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH'
